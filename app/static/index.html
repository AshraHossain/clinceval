<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClinCalc-Eval — Clinical Calculator Assistant</title>
<style>
  :root {
    --surface: #f7f8fa;
    --card: #ffffff;
    --text: #1a2333;
    --muted: #5b6b82;
    --accent: #0f6fde;
    --accent-ink: #0a4f9e;
    --danger: #b3261e;
    --ok: #1a7f37;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--surface); color: var(--text);
    font: 16px/1.55 -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  main { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
  h1 { font-size: 1.6rem; letter-spacing: -0.02em; margin: 0 0 0.25rem; }
  .subtitle { color: var(--muted); margin: 0 0 2rem; font-size: 0.95rem; }
  form { display: flex; gap: 0.6rem; }
  textarea {
    flex: 1; resize: vertical; min-height: 5.2rem; padding: 0.75rem 0.9rem;
    border: 1px solid #d4dbe6; border-radius: var(--radius);
    font: inherit; background: var(--card);
  }
  textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
  button {
    align-self: flex-end; padding: 0.65rem 1.3rem; border: 0; border-radius: var(--radius);
    background: var(--accent); color: #fff; font: inherit; font-weight: 600; cursor: pointer;
  }
  button:hover { background: var(--accent-ink); }
  button:disabled { opacity: 0.55; cursor: wait; }
  #loading { display: none; margin-top: 1.5rem; color: var(--muted); }
  #loading.visible { display: block; }
  #error {
    display: none; margin-top: 1.5rem; padding: 0.9rem 1.1rem;
    border-radius: var(--radius); background: #fdeceb; color: var(--danger);
  }
  #error.visible { display: block; }
  #result {
    display: none; margin-top: 1.5rem; padding: 1.4rem 1.5rem;
    background: var(--card); border: 1px solid #e3e8f0; border-radius: var(--radius);
  }
  #result.visible { display: block; }
  #result h2 { margin: 0 0 0.2rem; font-size: 1.15rem; }
  .badge {
    display: inline-block; font-size: 0.78rem; font-weight: 600; padding: 0.15rem 0.55rem;
    border-radius: 999px; background: #e7f3eb; color: var(--ok); vertical-align: middle;
  }
  .badge.declined { background: #fdf3e7; color: #8a5a00; }
  #rationale { margin: 0.8rem 0 0; }
  #citations { margin: 0.9rem 0 0; padding: 0; list-style: none; }
  #citations li {
    display: inline-block; margin: 0 0.4rem 0.4rem 0; padding: 0.12rem 0.55rem;
    font: 0.78rem/1.6 ui-monospace, monospace; background: #eef2f8; border-radius: 6px;
    color: var(--muted);
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>ClinCalc-Eval</h1>
    <p class="subtitle">Describe the patient presentation; the assistant recommends a medical calculator with cited rationale.</p>
  </header>

  <form id="query-form" aria-label="Patient query">
    <textarea id="query" name="query" required
      placeholder="e.g. A 75-year-old female with atrial fibrillation and hypertension needs stroke risk assessment."></textarea>
    <button id="submit" type="submit">Recommend</button>
  </form>

  <p id="loading" role="status">Analyzing presentation…</p>
  <div id="error" role="alert"></div>

  <section id="result" aria-live="polite">
    <h2><span id="calculator"></span> <span id="status-badge" class="badge"></span></h2>
    <p id="rationale"></p>
    <ul id="citations"></ul>
  </section>
</main>

<script>
const form = document.getElementById("query-form");
const el = (id) => document.getElementById(id);

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  const query = el("query").value.trim();
  if (!query) return;

  el("submit").disabled = true;
  el("loading").classList.add("visible");
  el("error").classList.remove("visible");
  el("result").classList.remove("visible");

  try {
    const resp = await fetch("/api/recommend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query }),
    });
    if (!resp.ok) throw new Error(`Server error (${resp.status})`);
    const data = await resp.json();
    const rec = data.recommendation;
    const declined = !rec.calculator || rec.calculator === "None";

    el("calculator").textContent = declined ? "No calculator recommended" : rec.calculator;
    el("status-badge").textContent = declined ? "declined" : "recommended";
    el("status-badge").className = "badge" + (declined ? " declined" : "");
    el("rationale").textContent = rec.rationale;
    el("citations").innerHTML = "";
    for (const cid of rec.citations || []) {
      const li = document.createElement("li");
      li.textContent = cid;
      el("citations").appendChild(li);
    }
    el("result").classList.add("visible");
  } catch (err) {
    el("error").textContent = "Something went wrong: " + err.message + ". Please try again.";
    el("error").classList.add("visible");
  } finally {
    el("submit").disabled = false;
    el("loading").classList.remove("visible");
  }
});
</script>
</body>
</html>
