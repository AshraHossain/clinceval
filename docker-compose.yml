services:
  app:
    build: .
    environment:
      # Optional; unset → deterministic mock mode (free, no API calls)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HF_HOME=/app/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      # Persist the embedding-model cache and Chroma store across restarts so
      # the first request isn't a cold re-download / re-index. Chroma is
      # embedded (chromadb.PersistentClient) — no separate DB container needed.
      - ./.cache/huggingface:/app/.cache/huggingface
      - ./chroma_store:/app/chroma_store
      - ./eval/reports:/app/eval/reports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s
